<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Frameworks Comparison</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-6 bg-slate-50">

    <h1 class="text-2xl font-bold mb-6">Perbandingan Framework CSS</h1>

    <div class="card mb-4" style="max-width: 400px;">
        <div class="card-body">
            <h5 class="card-title">Bootstrap Card</h5>
            <p class="card-text">Component-based CSS Framework.</p>
        </div>
    </div>

    <div class="bg-white rounded-xl shadow-md p-6 max-w-sm mb-4">
        <h2 class="text-lg font-bold mb-2">Tailwind Card</h2>
        <p class="text-gray-600">Utility-first CSS Framework.</p>
    </div>

    <script>
        const cardStyle = `
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        `;
        console.log("CSS-in-JS example:", cardStyle);
    </script>

</body>
</html>
